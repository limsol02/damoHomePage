<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="회사소개 - M&B Remodeling">
    <title>회사소개 | M&B Remodeling</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .page-hero {
            position: relative;
            width: 100%;
            height: 50vh;
            min-height: 400px;
            background-image: url('images/fourth-slide.jpg');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .page-hero .hero-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); }
        .page-hero-content { position: relative; z-index: 2; text-align: center; color: white; }
        .page-hero-title { font-family: var(--font-primary); font-size: clamp(32px, 5vw, 48px); font-weight: 700; margin-bottom: 16px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .content-section { padding: var(--spacing-xl) 0; }
        .content-section .section-description { text-align: center; max-width: 800px; margin: 0 auto var(--spacing-md); }
        .highlight-text { color: var(--accent-orange); font-weight: 600; }
        .cta-section { text-align: center; margin-top: var(--spacing-lg); }
        .cta-section .btn-primary { display: inline-block; padding: 16px 32px; background: var(--accent-orange); color: #fff; border-radius: var(--radius-md); font-weight: 600; text-decoration: none; transition: var(--transition-base); }
        .cta-section .btn-primary:hover { background: var(--accent-orange-hover); transform: translateY(-2px); }
        @media (max-width: 768px) { .page-hero { height: 40vh; min-height: 300px; } }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>

    <section class="page-hero">
        <div class="hero-overlay"></div>
        <div class="page-hero-content">
            <h1 class="page-hero-title">회사소개</h1>
            <p>함께 만들어 가는 미래</p>
        </div>
    </section>

    <section class="content-section">
        <div class="container">
            <h2 class="section-title" style="text-align: center;">Crafting Dream Homes Since 2005</h2>
            <p class="section-description">
                <strong>M&B Remodeling</strong>은 특별한 생활 공간을 만들어가는 신뢰할 수 있는 파트너입니다. <span class="highlight-text">18년 이상의 경험</span>을 바탕으로 섬세한 디테일, 혁신적인 디자인, 뛰어난 기술력으로 집을 꿈의 공간으로 변신시킵니다.
            </p>
            <p class="section-description">
                숙련된 전문가 팀이 기대를 뛰어넘는 프로젝트를 예산과 일정 내에 완수합니다. 기획부터 완공까지, 고객과 긴밀히 협력하여 비전을 현실로 만들어 드립니다.
            </p>
            <div class="cta-section">
                <a href="index.html#contact" class="btn-primary">문의하기</a>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="js/nav.js"></script>
    <script src="js/footer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
