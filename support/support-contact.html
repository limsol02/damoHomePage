<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="문의하기 - 고객지원">
    <title>문의하기 | 고객지원</title>
    <link rel="icon" type="image/png" href="../images/loga.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-hero { position: relative; width: 100%; height: 40vh; min-height: 300px; background: linear-gradient(135deg, var(--accent-orange) 0%, var(--accent-orange-hover) 100%); display: flex; align-items: center; justify-content: center; }
        .page-hero-content { position: relative; z-index: 2; text-align: center; color: var(--primary-white); }
        .page-hero-title { font-family: var(--font-primary); font-size: clamp(32px, 5vw, 48px); font-weight: 600; letter-spacing: var(--letter-spacing-tight); margin-bottom: 16px; }
        .content-section { padding: var(--spacing-xl) 0; }
        @media (max-width: 768px) { .page-hero { height: 35vh; min-height: 280px; } }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>
    <section class="page-hero">
        <div class="page-hero-content">
            <h1 class="page-hero-title">문의하기</h1>
            <p>궁금한 점을 남겨 주시면 빠르게 답변 드립니다</p>
        </div>
    </section>
    <section class="contact content-section" id="contact">
        <div class="container">
            <div class="section-header section-header--tight" style="text-align: center;">
                <h2 class="section-title">문의하기</h2>
                <p class="section-tagline">폼 작성 또는 전화·이메일로 연락 주세요.</p>
            </div>
            <div class="contact-content">
                <div class="contact-form-wrapper">
                    <form class="contact-form" id="contactForm">
                        <div class="form-group">
                            <label for="name">이름</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="email">이메일</label>
                                <input type="email" id="email" name="email" required>
                            </div>
                            <div class="form-group">
                                <label for="phone">연락처</label>
                                <input type="tel" id="phone" name="phone" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="subject">문의 유형</label>
                            <select id="subject" name="subject">
                                <option value="general">일반 문의</option>
                                <option value="product">제품·서비스 문의</option>
                                <option value="tech">기술 지원</option>
                                <option value="partner">파트너십</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="message">내용</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">보내기</button>
                    </form>
                </div>
                <div class="contact-info">
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-envelope"></i></div>
                        <div class="info-text">
                            <h4>이메일</h4>
                            <p>info@ltree.kr</p>
                        </div>
                    </div>
                    <div class="info-item">
                        <div class="info-icon"><i class="fas fa-map-marker-alt"></i></div>
                        <div class="info-text">
                            <h4>주소</h4>
                            <p>서울특별시 강남구 봉은사로 33길 5, 5층</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>

    <script src="../js/nav.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
