<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="오시는 길 - 회사소개">
    <title>오시는 길 | 회사소개</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-hero { position: relative; width: 100%; height: 45vh; min-height: 360px; background: linear-gradient(135deg, var(--brand-brown) 0%, var(--brand-brown-light) 100%); display: flex; align-items: center; justify-content: center; }
        .page-hero-content { position: relative; z-index: 2; text-align: center; color: white; }
        .page-hero-title { font-family: var(--font-primary); font-size: clamp(32px, 5vw, 48px); font-weight: 700; margin-bottom: 16px; }
        .content-section { padding: var(--spacing-xl) 0; }
        .location-card { max-width: 600px; margin: 0 auto; background: var(--neutral-light); border-radius: var(--radius-md); padding: var(--spacing-lg); }
        .location-card h3 { font-family: var(--font-primary); margin-bottom: var(--spacing-sm); }
        .location-card p { margin-bottom: 12px; color: #555; }
        .location-card a { color: var(--accent-orange); font-weight: 600; }
        @media (max-width: 768px) { .page-hero { height: 35vh; min-height: 280px; } }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>
    <section class="page-hero">
        <div class="page-hero-content">
            <h1 class="page-hero-title">오시는 길</h1>
            <p>찾아오시는 길을 안내합니다</p>
        </div>
    </section>
    <section class="content-section">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">위치 안내</h2>
                <p class="section-subtitle">주소, 대중교통, 주차 안내</p>
            </div>
            <div class="location-card">
                <h3><i class="fas fa-map-marker-alt" style="color: var(--accent-orange); margin-right: 8px;"></i>주소</h3>
                <p>123 Remodeling Ave, Los Angeles, CA 90001</p>
                <h3><i class="fas fa-car" style="color: var(--accent-orange); margin-right: 8px;"></i>대중교통</h3>
                <p>지하철 1호선 ○○역 3번 출구 도보 5분</p>
                <h3><i class="fas fa-phone-alt" style="color: var(--accent-orange); margin-right: 8px;"></i>연락처</h3>
                <p>전화: 123-456-7890 | 이메일: <a href="mailto:info@mbremodeling.com">info@mbremodeling.com</a></p>
                <p style="margin-top: 16px;"><a href="https://maps.google.com" target="_blank" rel="noopener">지도에서 보기 →</a></p>
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>

    <script src="../js/nav.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
