<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="오시는 길 - 회사소개">
    <title>오시는 길 | 회사소개</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .page-hero { position: relative; width: 100%; height: 45vh; min-height: 360px; background: linear-gradient(135deg, var(--brand-brown) 0%, var(--brand-brown-light) 100%); display: flex; align-items: center; justify-content: center; }
        .page-hero-content { position: relative; z-index: 2; text-align: center; color: var(--primary-white); }
        .page-hero-title { font-family: var(--font-primary); font-size: clamp(32px, 5vw, 48px); font-weight: 600; letter-spacing: var(--letter-spacing-tight); margin-bottom: 16px; }
        .content-section { padding: var(--spacing-xl) 0; }
        .location-card { max-width: 600px; margin: 0 auto; background: var(--neutral-light); border-radius: var(--radius-md); padding: var(--spacing-lg); }
        .location-card h3 { font-family: var(--font-primary); margin-bottom: var(--spacing-sm); }
        .location-card p { margin-bottom: 12px; color: var(--text-muted); }
        .location-card a { color: var(--color-teal); font-weight: 600; }
        .location-map-wrap { width: 100%; height: 320px; border-radius: var(--radius-md); overflow: hidden; margin-bottom: var(--spacing-md); background: var(--neutral-gray); }
        #kakao-map { width: 100%; height: 100%; }
        @media (max-width: 768px) { .page-hero { height: 35vh; min-height: 280px; } }
    </style>
</head>
<body>
    <div id="nav-placeholder"></div>
    <section class="page-hero">
        <div class="page-hero-content">
            <h1 class="page-hero-title">오시는 길</h1>
            <p>찾아오시는 길을 안내합니다</p>
        </div>
    </section>
    <section class="content-section">
        <div class="container">
            <div class="section-header section-header--tight" style="text-align: center;">
                <h2 class="section-title">위치 안내</h2>
                <p class="section-tagline">주소·대중교통·연락처</p>
            </div>
            <div class="location-card">
                <div class="location-map-wrap">
                    <div id="kakao-map"></div>
                </div>
                <h3><i class="fas fa-map-marker-alt" style="color: var(--color-teal); margin-right: 8px;"></i>주소</h3>
                <p>서울특별시 강남구 봉은사로 33길 5, 5층</p>
                <p style="margin-top: 16px;"><a href="https://map.kakao.com/link/search/서울특별시%20강남구%20봉은사로%2033길%205" target="_blank" rel="noopener">카카오맵에서 보기 →</a></p>
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=YOUR_KAKAO_JAVASCRIPT_APP_KEY&libraries=services&autoload=false"></script>
    <script>
    (function() {
        var address = '서울특별시 강남구 봉은사로 33길 5';
        var mapEl = document.getElementById('kakao-map');
        if (!mapEl) return;
        function initMap() {
            if (typeof kakao === 'undefined' || !kakao.maps || !kakao.maps.services) {
                mapEl.innerHTML = '<p style="padding:2rem;text-align:center;color:#666;">카카오맵 API 키를 설정해 주세요. <a href="https://map.kakao.com/link/search/' + encodeURIComponent(address) + '" target="_blank" rel="noopener">카카오맵에서 보기</a></p>';
                return;
            }
            kakao.maps.load(function() {
                var geocoder = new kakao.maps.services.Geocoder();
                geocoder.addressSearch(address, function(result, status) {
                    if (status !== kakao.maps.services.Status.OK) {
                        mapEl.innerHTML = '<p style="padding:2rem;text-align:center;color:#666;">지도를 불러올 수 없습니다. <a href="https://map.kakao.com/link/search/' + encodeURIComponent(address) + '" target="_blank" rel="noopener">카카오맵에서 보기</a></p>';
                        return;
                    }
                    var coords = new kakao.maps.LatLng(result[0].y, result[0].x);
                    var mapOption = { center: coords, level: 3 };
                    var map = new kakao.maps.Map(mapEl, mapOption);
                    var marker = new kakao.maps.Marker({ position: coords, map: map });
                });
            });
        }
        if (typeof kakao !== 'undefined' && kakao.maps) initMap();
        else window.addEventListener('load', initMap);
    })();
    </script>
    <script src="../js/nav.js"></script>
    <script src="../js/footer.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
